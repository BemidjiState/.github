name: "CD: Redeploy Release (Manual)"

# =============================================================================
# Manual deployment workflow for zip-delivery packages.
# Copy this file to .github/workflows/deploy-manual.yml in the target repo
# and follow the configuration steps below.
#
# Triggered manually from the Actions tab. Select the target environment
# from the dropdown and type the release tag to deploy.
#
# The ref input must be a release tag that has a zip asset attached e.g.
# 2.4.1-rc for a prerelease or 2.4.1 for a stable release. The workflow
# resolves the tag to a zip asset ID via the GitHub API before sending
# the HQ deploy payload.
#
# HOW TO CONFIGURE THIS FILE:
# ----------------------------
# 1. Remove environment options that do not apply to this package.
# 2. Ensure the remaining options exactly match the location environment names
#    configured for this package in /data/hq/config.json.
#
# KEEP IN SYNC:
# The environment names used here must match:
#   - The options list in rollback.yml
#   - The HQ_ENVIRONMENTS repository variable
#   - The location environment names in /data/hq/config.json
# The check endpoint validates this on every run and fails immediately if
# they are out of sync.
#
# Environment access:
#   bsu-dev / ntc-dev     — any developer with repository access
#   all others            — MERGE_APPROVAL_TEAM members only
#                           (enforced by GitHub Environment protection rules)
#
# All deployment logic lives in the shared hq-deploy-zip.yml workflow.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          # Uncomment only the environments this package deploys to.
          # These must match exactly the location environment names in
          # /data/hq/config.json and the HQ_ENVIRONMENTS repository variable.
          # - bsu-dev
          # - bsu-staging
          # - ntc-dev
          # - ntc-staging
      ref:
        description: >
          Release tag to deploy e.g. 2.4.1-rc or 2.4.1.
          The tag must have a zip asset attached to its GitHub Release.
        required: true
        type: string

jobs:
  deploy:
    uses: BemidjiState/.github/.github/workflows/hq-deploy-zip.yml@1.0.11
    with:
      package:           ${{ vars.HQ_PACKAGE }}
      environment:       ${{ inputs.environment }}
      ref:               ${{ inputs.ref }}
      yaml_environments: ${{ vars.HQ_ENVIRONMENTS }}
      poll_for_result:   true
    secrets:
      hmac_secret:       ${{ secrets.ORG__HQ_HMAC }}