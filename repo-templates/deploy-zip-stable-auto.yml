name: "CD: Deploy Stable to Production (Auto)"

# =============================================================================
# Automatic stable release deployment workflow for zip-delivery packages.
# Copy this file to .github/workflows/deploy-zip-stable-auto.yml in the
# target repo and follow the configuration steps below.
#
# Triggers on stable release published targeting 'main' branch → production
#
# For prerelease → staging, see deploy-zip-auto.yml.
#
# HOW TO CONFIGURE THIS FILE:
# ----------------------------
# 1. Uncomment the job blocks for the environments this package deploys to.
# 2. Set the environment: value in each job to match the location environment
#    name configured for this package in /data/hq/config.json exactly.
# 3. Remove job blocks for environments that do not apply to this package.
# 4. The coordinated rollback job at the bottom only applies when multiple
#    production environments are configured. Remove it if this package only
#    deploys to a single production environment.
#
# KEEP IN SYNC:
# The environment names used here must match:
#   - The options list in deploy-zip-manual.yml and rollback.yml
#   - The HQ_ENVIRONMENTS repository variable
#   - The location environment names in /data/hq/config.json
# The check endpoint validates this on every run.
# =============================================================================

