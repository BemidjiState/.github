name: Deploy Stable Release

# =============================================================================
# Stable release deployment workflow for zip-delivery packages.
# Copy this file to .github/workflows/deploy-stable.yml in the target repo
# and follow the configuration steps below.
#
# Triggers automatically when a stable (non-prerelease) release is published.
# Extracts the zip asset ID directly from the release event and deploys to
# production environments sequentially: BSU first, then NTC. If NTC fails,
# both environments are rolled back to keep them in sync.
#
# HOW TO CONFIGURE THIS FILE:
# ----------------------------
# 1. Set the environment: values in deploy-bsu-prod and deploy-ntc-prod to
#    match the location environment names in /data/hq/config.json exactly.
# 2. Remove the NTC jobs if this package does not deploy to NTC.
# 3. Update the asset filter if the zip asset name pattern differs from
#    the default (content_type: application/zip).
#
# KEEP IN SYNC:
# The environment names used here must match:
#   - The options list in deploy-zip-manual.yml and rollback.yml
#   - The HQ_ENVIRONMENTS repository variable
#   - The location environment names in /data/hq/config.json
# The check endpoint validates this on every run.
#
# Environment access:
#   Production environments — MERGE_APPROVAL_TEAM members only
#                             (enforced by GitHub Environment protection rules)
# =============================================================================

on:
  release:
    types:
      - published

jobs:

  # ---------------------------------------------------------------------------
  # Guard: only run for stable releases, not prereleases.
  # The deploy-zip-manual.yml workflow handles prerelease deployments.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Job 1: deploy-bsu-prod
  # Deploys to BSU production. Extracts the zip asset ID from the release
  # event and passes it directly to hq-deploy-zip.yml — no API resolution
  # needed since the asset is available in the event payload.
  # ---------------------------------------------------------------------------

  deploy-bsu-prod:
    if: '!github.event.release.prerelease'
    uses: BemidjiState/.github/.github/workflows/hq-deploy-zip.yml@1.0.0
    with:
      package:           ${{ vars.HQ_PACKAGE }}
      environment:       bsu-prod
      ref:               ${{ github.event.release.tag_name }}
      yaml_environments: ${{ vars.HQ_ENVIRONMENTS }}
      asset_id:          ${{ github.event.release.assets[0].id }}
      poll_for_result:   true
    secrets:
      hmac_secret:       ${{ secrets.ORG__HQ_HMAC }}

  # ---------------------------------------------------------------------------
  # Job 2: deploy-ntc-prod
  # Runs only after BSU production succeeds. If this job fails, the
  # rollback-on-failure job rolls back both BSU and NTC.
  # Remove this job if this package does not deploy to NTC.
  # ---------------------------------------------------------------------------

  deploy-ntc-prod:
    needs: deploy-bsu-prod
    if: '!github.event.release.prerelease'
    uses: BemidjiState/.github/.github/workflows/hq-deploy-zip.yml@1.0.0
    with:
      package:           ${{ vars.HQ_PACKAGE }}
      environment:       ntc-prod
      ref:               ${{ github.event.release.tag_name }}
      yaml_environments: ${{ vars.HQ_ENVIRONMENTS }}
      asset_id:          ${{ github.event.release.assets[0].id }}
      poll_for_result:   true
    secrets:
      hmac_secret:       ${{ secrets.ORG__HQ_HMAC }}

  # ---------------------------------------------------------------------------
  # Job 3: rollback-on-failure
  # Runs if NTC deployment failed. Rolls back both BSU and NTC to the
  # previously active ref to keep the environments in sync.
  # Remove the NTC rollback step if this package does not deploy to NTC.
  # ---------------------------------------------------------------------------

  rollback-on-failure:
    name: Rollback on Failure
    needs: [deploy-bsu-prod, deploy-ntc-prod]
    runs-on: ubuntu-latest
    if: >-
      failure() &&
      needs.deploy-ntc-prod.result == 'failure'

    steps:

      - name: Roll back BSU production
        run: |
          PAYLOAD=$(jq -nc \
            --arg package     "${{ vars.HQ_PACKAGE }}" \
            --arg environment "bsu-prod" \
            --arg ref         "${{ needs.deploy-bsu-prod.outputs.previous_ref }}" \
            --arg sender      "${{ github.actor }}" \
            '{package: $package, environment: $environment, ref: $ref,
              sender: {login: $sender}}')

          SIG="sha256=$(printf '%s' "${PAYLOAD}" | \
            openssl dgst -sha256 -hmac '${{ secrets.ORG__HQ_HMAC }}' | \
            awk '{print $2}')"

          HTTP_CODE=$(curl -s -o /tmp/rollback_bsu.json -w "%{http_code}" \
            -X POST "https://api.bemidjistate.edu/hq/rollback/" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${SIG}" \
            -d "${PAYLOAD}" \
            --connect-timeout 10 \
            --max-time 120)

          echo "BSU rollback HTTP ${HTTP_CODE}"

          if [ "${HTTP_CODE}" = "200" ]; then
            echo "BSU rollback completed successfully."
          elif [ "${HTTP_CODE}" = "409" ]; then
            echo "::warning::BSU rollback could not proceed — a deployment is currently in progress (HTTP 409)."
            exit 1
          elif [ "${HTTP_CODE}" = "403" ]; then
            echo "::error::BSU rollback HMAC verification failed (HTTP 403)."
            exit 1
          else
            echo "::error::BSU rollback failed (HTTP ${HTTP_CODE}). Manual intervention required."
            cat /tmp/rollback_bsu.json
            exit 1
          fi

      - name: Roll back NTC production
        run: |
          PAYLOAD=$(jq -nc \
            --arg package     "${{ vars.HQ_PACKAGE }}" \
            --arg environment "ntc-prod" \
            --arg ref         "${{ needs.deploy-ntc-prod.outputs.previous_ref }}" \
            --arg sender      "${{ github.actor }}" \
            '{package: $package, environment: $environment, ref: $ref,
              sender: {login: $sender}}')

          SIG="sha256=$(printf '%s' "${PAYLOAD}" | \
            openssl dgst -sha256 -hmac '${{ secrets.ORG__HQ_HMAC }}' | \
            awk '{print $2}')"

          HTTP_CODE=$(curl -s -o /tmp/rollback_ntc.json -w "%{http_code}" \
            -X POST "https://api.bemidjistate.edu/hq/rollback/" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${SIG}" \
            -d "${PAYLOAD}" \
            --connect-timeout 10 \
            --max-time 120)

          echo "NTC rollback HTTP ${HTTP_CODE}"

          if [ "${HTTP_CODE}" = "200" ]; then
            echo "NTC rollback completed successfully."
          elif [ "${HTTP_CODE}" = "409" ]; then
            echo "::warning::NTC rollback could not proceed — a deployment is currently in progress (HTTP 409)."
            exit 1
          elif [ "${HTTP_CODE}" = "403" ]; then
            echo "::error::NTC rollback HMAC verification failed (HTTP 403)."
            exit 1
          else
            echo "::error::NTC rollback failed (HTTP ${HTTP_CODE}). Manual intervention required."
            cat /tmp/rollback_ntc.json
            exit 1
          fi