name: Rollback

# =============================================================================
# Manual rollback workflow. Works for both git-delivery and zip-delivery
# packages — HQ handles the delivery difference on the server side.
# Copy this file to .github/workflows/rollback.yml in the target repo
# and follow the configuration steps below.
#
# Triggered manually from the Actions tab. Select the environment and type
# the ref to roll back to.
#
# For git-delivery packages: ref is a branch name, tag, or commit SHA.
# For zip-delivery packages: ref is a release tag e.g. 2.4.1 or 2.4.1-rc.
#
# To see available refs for this package run on the server:
#   hq status {package}
#
# HOW TO CONFIGURE THIS FILE:
# ----------------------------
# 1. Remove environment options that do not apply to this package.
# 2. Ensure the remaining options exactly match the location environment names
#    configured for this package in /data/hq/config.json.
#
# KEEP IN SYNC:
# The environment names used here must match:
#   - The options list in the deploy workflow(s) for this package
#   - The HQ_ENVIRONMENTS repository variable
#   - The location environment names in /data/hq/config.json
# The check endpoint validates this on every run and fails immediately if
# they are out of sync.
#
# Environment access:
#   bsu-dev / ntc-dev     — any developer with repository access
#   all others            — MERGE_APPROVAL_TEAM members only
#                           (enforced by GitHub Environment protection rules)
#
# All rollback logic lives in the shared hq-rollback.yml workflow.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to roll back
        required: true
        type: choice
        options:
          # Uncomment only the environments this package deploys to.
          # These must match exactly the location environment names in
          # /data/hq/config.json and the HQ_ENVIRONMENTS repository variable.
          # - bsu-dev
          # - bsu-prod
          # - bsu-staging
          # - ntc-dev
          # - ntc-prod
          # - ntc-staging
      ref:
        description: >
          Ref to roll back to — release tag, branch name, or commit SHA.
          Run on the server to see available refs:
          hq status {package}
        required: true
        type: string

jobs:
  rollback:
    uses: BemidjiState/.github/.github/workflows/hq-rollback.yml@1.0.111
    with:
      package:           ${{ vars.HQ_PACKAGE }}
      environment:       ${{ inputs.environment }}
      ref:               ${{ inputs.ref }}
      yaml_environments: ${{ vars.HQ_ENVIRONMENTS }}
    secrets:
      hmac_secret:       ${{ secrets.ORG__HQ_HMAC }}